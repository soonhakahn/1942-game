<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>1942 - 전투기 전설</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center
    }

    canvas {
      display: block
    }

    #startScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0b1628 0%, #162a4a 40%, #1a3a5c 100%);
      z-index: 10
    }

    .title-year {
      font-size: 72px;
      font-weight: 900;
      background: linear-gradient(180deg, #ffd700 0%, #ff8c00 60%, #cc5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 8px;
      line-height: 1;
      animation: titleGlow 2s ease-in-out infinite alternate
    }

    @keyframes titleGlow {
      from {
        filter: brightness(1) drop-shadow(0 0 10px rgba(255, 165, 0, .3))
      }

      to {
        filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 165, 0, .6))
      }
    }

    .title-sub {
      font-size: 18px;
      color: #7ec8e3;
      letter-spacing: 12px;
      text-transform: uppercase;
      margin-top: 8px
    }

    .plane-icon {
      width: 100px;
      height: 100px;
      margin: 20px auto;
      animation: float 3s ease-in-out infinite
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-15px)
      }
    }

    .start-btn {
      padding: 16px 60px;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #c0392b 100%);
      border: 3px solid #ff6b6b;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 4px;
      box-shadow: 0 0 30px rgba(231, 76, 60, .4), inset 0 1px 0 rgba(255, 255, 255, .2);
      transition: all .3s;
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(231, 76, 60, .4)
      }

      50% {
        box-shadow: 0 0 50px rgba(231, 76, 60, .7)
      }
    }

    .start-btn:hover {
      transform: scale(1.05)
    }

    .controls-hint {
      margin-top: 30px;
      color: #5a8ba8;
      font-size: 13px;
      text-align: center;
      line-height: 2
    }

    #gameOverScreen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, .85);
      z-index: 10
    }

    .gameover-title {
      font-size: 56px;
      font-weight: 900;
      color: #e74c3c;
      text-shadow: 0 0 40px rgba(231, 76, 60, .6);
      margin-bottom: 20px
    }

    .gameover-score {
      font-size: 24px;
      color: #ffd700;
      margin-bottom: 10px
    }

    .gameover-high {
      font-size: 16px;
      color: #7ec8e3;
      margin-bottom: 40px
    }

    #weaponPopup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, .9);
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 16px 24px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      z-index: 5;
      display: none;
      animation: popIn .3s ease
    }

    @keyframes popIn {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0
      }

      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1
      }
    }
  </style>
</head>

<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="startScreen">
      <div style="text-align:center;margin-bottom:40px">
        <div class="title-year">1942</div>
        <div class="title-sub">Squadron</div>
      </div>
      <svg class="plane-icon" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a90d9" />
            <stop offset="100%" style="stop-color:#2c5f8a" />
          </linearGradient>
        </defs>
        <polygon points="50,10 60,40 85,45 65,55 70,85 50,70 30,85 35,55 15,45 40,40" fill="url(#pg)" stroke="#7ec8e3"
          stroke-width="1.5" />
        <rect x="44" y="50" width="12" height="25" rx="3" fill="#3a7bc8" />
      </svg>
      <button class="start-btn" id="startBtn">START</button>
      <div class="controls-hint">🖥 키보드: 방향키 이동 / Space 사격 / X 폭탄<br>📱 모바일: 터치 드래그 이동 / 자동 사격 / 더블탭 폭탄</div>
    </div>
    <div id="gameOverScreen">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-score" id="finalScore">SCORE: 0</div>
      <div class="gameover-high" id="finalHigh">BEST: 0</div>
      <button class="start-btn" id="restartBtn">RETRY</button>
    </div>
    <div id="weaponPopup"></div>
  </div>
  <script src="game.js"></script>
</body>

</html>
